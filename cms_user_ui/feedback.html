<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Module - Secure CMS</title>
    <meta name="description" content="Share your experience">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="consent-style.css">
</head>
<body>

<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <!-- Re-used sidebar layout -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <div class="sidebar-title">Secure CMS</div>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Overview
            </a>
            <a href="my-consents.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg> My Consents
            </a>
            <a href="dsr-raise.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> DSR Management
            </a>
            <a href="grievance-raise.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> Grievance System
            </a>
            <a href="feedback.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg> Feedback
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Profile & Settings
            </a>
            <a href="#" class="nav-item" style="color: var(--danger);" onclick="logout()">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header" style="margin-bottom: 2rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="menu-toggle" id="btn-menu-toggle">Menu</button>
                <h2>Give Feedback</h2>
            </div>
            <div class="user-profile">
                <!-- Avatar Only -->
                <div class="avatar" style="background-image: url('https://ui-avatars.com/api/?name=Rhea+Sharma&background=000&color=fff'); width: 44px; height: 44px;"></div>
            </div>
        </header>

        <div class="panel" style="max-width: 700px; margin: 0 auto; margin-top: 2rem;">
            <div class="panel-header" style="border-bottom:none; display:flex; flex-direction:column; align-items:center; text-align:center;">
                <div style="background-color:#e0e7ff; color:#4f46e5; width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:1rem;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                </div>
                <h3 class="panel-title" style="font-size:1.5rem; margin-bottom:0.5rem;">How was your experience?</h3>
                <p style="color:var(--text-muted); font-size:0.95rem; max-width:400px;">We constantly strive to make managing your digital consent footprint completely frictionless.</p>
            </div>
            
            <form id="feedback-form" onsubmit="event.preventDefault(); submitFeedback();" style="margin-top:1.5rem;">
                <div class="form-group" style="max-width:300px; margin: 0 auto 2rem auto;">
                    <label class="form-label text-center" for="fb-link" style="text-align:center;">What are you giving feedback on?</label>
                    <select id="fb-link" class="form-control" required style="text-align:center;">
                        <option value="general">General Platform & Consent Experience</option>
                        <option value="dsr">Recent DSR Request Fulfiment</option>
                        <option value="grievance">Grievance Ticket Resolution</option>
                    </select>
                </div>

                <!-- Interactive CSS Star Rating -->
                <div class="rating-container" style="display:flex; justify-content:center; margin-bottom: 2rem;">
                    <div class="star-rating">
                        <input type="radio" id="star5" name="rating" value="5" required/><label for="star5" title="Excellent">★</label>
                        <input type="radio" id="star4" name="rating" value="4"/><label for="star4" title="Good">★</label>
                        <input type="radio" id="star3" name="rating" value="3"/><label for="star3" title="Average">★</label>
                        <input type="radio" id="star2" name="rating" value="2"/><label for="star2" title="Poor">★</label>
                        <input type="radio" id="star1" name="rating" value="1"/><label for="star1" title="Terrible">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="fb-comments">Detailed Comments</label>
                    <textarea id="fb-comments" class="form-control" rows="4" placeholder="Tell us what you liked or how we can improve..." required></textarea>
                </div>

                <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" id="btn-submit-fb" style="width:100%; max-width:200px;">Submit Feedback</button>
                </div>
            </form>
        </div>
    </main>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast-fb" style="background-color: var(--success);">Thank you for your valuable feedback!</div>

<script src="script.js"></script>
<script>
    function submitFeedback() {
        const btn = document.getElementById('btn-submit-fb');
        btn.innerHTML = 'Sending...';
        btn.disabled = true;

        setTimeout(() => {
            const toast = document.getElementById('toast-fb');
            toast.classList.remove('hidden');
            
            // reset form after delay
            setTimeout(() => {
                document.getElementById('feedback-form').reset();
                btn.innerHTML = 'Submit Feedback';
                btn.disabled = false;
                
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 1000);
            }, 2500);
        }, 800);
    }
</script>
</body>
</html>
