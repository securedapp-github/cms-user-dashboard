<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raise Grievance - Secure CMS</title>
    <meta name="description" content="Report an issue or violation">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="consent-style.css">
</head>
<body>

<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <!-- Re-used sidebar layout -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <div class="sidebar-title">Secure CMS</div>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Overview
            </a>
            <a href="my-consents.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                My Consents
            </a>
            <a href="dsr-raise.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                DSR Management
            </a>
            <a href="grievance-raise.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                Grievance System
            </a>
            <a href="feedback.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                Feedback
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Profile & Settings
            </a>
            <a href="#" class="nav-item" style="color: var(--danger);" onclick="logout()">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header" style="margin-bottom: 2rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="menu-toggle" id="btn-menu-toggle">Menu</button>
                <h2>Raise Grievance</h2>
            </div>
            
            <a href="grievance-history.html" class="btn btn-outline btn-sm">Ticket History</a>
        </header>

        <div class="panel" style="max-width: 800px;">
            <div class="panel-header">
                <h3 class="panel-title">Report an Issue</h3>
                <span class="badge badge-pending" style="background:#fef3c7; color:#92400e; display: flex; align-items:center; gap:0.25rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    SLA: Escalates to DPO automatically in 48h
                </span>
            </div>
            
            <form id="grievance-form" onsubmit="event.preventDefault(); submitGrievance();">
                <div class="form-group">
                    <label class="form-label" for="g-tenant">Involved Fiduciary/Tenant</label>
                    <select id="g-tenant" class="form-control" required>
                        <option value="">-- Select Organization --</option>
                        <option value="Global Trust Bank">Global Trust Bank</option>
                        <option value="FinTech App XYZ">FinTech App XYZ</option>
                        <option value="ShopEasy Commerce">ShopEasy Commerce</option>
                        <option value="other">Other / Unknown</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="g-category">Grievance Category</label>
                    <select id="g-category" class="form-control" required>
                        <option value="">-- Select Category --</option>
                        <option value="consent_viol">Consent Violation (Data used without permission)</option>
                        <option value="breach">Potential Data Breach</option>
                        <option value="proc_error">Inaccurate Processing / Error</option>
                        <option value="unauth_share">Unauthorized Third-Party Sharing</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="g-desc">Description of the Issue</label>
                    <textarea id="g-desc" class="form-control" rows="5" placeholder="Provide details about the unauthorized sharing or violation. The more specific, the quicker we can resolve it..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Evidence Attachments</label>
                    <div class="file-drop-zone" id="g-file-drop">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-light); margin-bottom: 0.5rem;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p style="margin:0; font-weight:500; font-size: 0.875rem;">Upload screenshots or communications</p>
                        <input type="file" id="g-file" style="display:none;" multiple />
                        <div id="g-file-name" style="margin-top:0.5rem; font-size:0.875rem; color: var(--danger); font-weight:600;"></div>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" id="btn-submit-g" style="background-color: var(--danger); border: none; width:auto; padding: 0.75rem 2rem;">File Grievance</button>
                </div>
            </form>
        </div>
    </main>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast-g" style="background-color: var(--danger);">Ticket GR-992 Filed Successfully!</div>

<script src="script.js"></script>
<script>
    document.getElementById('g-file-drop').addEventListener('click', () => {
        document.getElementById('g-file').click();
    });
    
    document.getElementById('g-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('g-file-name').textContent = file.name;
        }
    });

    function submitGrievance() {
        const btn = document.getElementById('btn-submit-g');
        btn.innerHTML = 'Filing...';
        btn.disabled = true;

        setTimeout(() => {
            const toast = document.getElementById('toast-g');
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                window.location.href = 'grievance-history.html';
            }, 1500);
        }, 1000);
    }
</script>
</body>
</html>
