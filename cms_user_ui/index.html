<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure CMS</title>
    <meta name="description" content="Secure Consent Management System - My Data & Consent Portal">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-header">
            <div class="logo-placeholder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Secure CMS</h2>
            <p>My Data & Consent Portal</p>
        </div>

        <!-- Step 1: Request OTP -->
        <div id="step-1" class="form-container">
            <div class="form-group">
                <label for="identifier" class="form-label">Email or Mobile Number</label>
                <input type="text" id="identifier" class="form-control" placeholder="Enter your email or phone" autocomplete="username">
            </div>
            <button id="btn-request-otp" class="btn btn-primary">Send OTP</button>
            
            <div id="alert-rate-limit" class="alert alert-warning hidden mt-4">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>Too many requests. Please try again in <strong id="timer">30</strong>s.</span>
            </div>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="step-2" class="form-container hidden">
            <div class="form-group text-center">
                <label class="form-label mb-2">Enter Verification Code</label>
                <p style="font-size: 0.85rem; margin-bottom: 1.5rem;">Sent to <strong id="display-identifier" style="color:var(--text-main);"></strong></p>
                
                <div class="otp-group" id="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="one-time-code">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                </div>
            </div>
            <button id="btn-verify-otp" class="btn btn-primary" style="margin-bottom: 1rem;">Verify & Login</button>
            <button id="btn-resend" class="btn btn-outline" disabled>Resend Code (30s)</button>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="#" id="btn-back" style="font-size: 0.875rem;">Change Mobile/Email</a>
            </div>
        </div>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.75rem; color: var(--text-light);">
            Protected by DPDP Act 2023 Guidelines
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
